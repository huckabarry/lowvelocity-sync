name: Import Bluesky updates to Ghost

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview only; do not create or update Ghost posts
        required: true
        type: boolean
        default: true
      update_existing:
        description: Update existing imported Bluesky posts
        required: true
        type: boolean
        default: false
      upload_images:
        description: Upload Bluesky images into Ghost
        required: true
        type: boolean
        default: true
      limit:
        description: Maximum posts to process
        required: true
        default: "25"
      max_pages:
        description: Maximum Bluesky API pages to scan
        required: true
        default: "10"
      since:
        description: Optional ISO date/time cutoff, inclusive
        required: false
        default: ""
      until:
        description: Optional ISO date/time upper cutoff, inclusive
        required: false
        default: ""

permissions:
  contents: read

jobs:
  import:
    name: Import Bluesky updates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Call lowvelocity-sync Bluesky importer
        env:
          GHOST_STAFF_ACCESS_TOKEN: ${{ secrets.GHOST_STAFF_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          UPDATE_EXISTING: ${{ inputs.update_existing }}
          UPLOAD_IMAGES: ${{ inputs.upload_images }}
          LIMIT: ${{ inputs.limit }}
          MAX_PAGES: ${{ inputs.max_pages }}
          SINCE: ${{ inputs.since }}
          UNTIL: ${{ inputs.until }}
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status="$(
            jq --null-input \
              --argjson dryRun "${DRY_RUN}" \
              --argjson updateExisting "${UPDATE_EXISTING}" \
              --argjson uploadImages "${UPLOAD_IMAGES}" \
              --argjson limit "${LIMIT}" \
              --argjson maxPages "${MAX_PAGES}" \
              --arg since "${SINCE}" \
              --arg until "${UNTIL}" \
              '{
                dryRun: $dryRun,
                updateExisting: $updateExisting,
                uploadImages: $uploadImages,
                limit: $limit,
                maxPages: $maxPages
              }
              + (if $since == "" then {} else {since: $since} end)
              + (if $until == "" then {} else {until: $until} end)' |
            curl --silent --show-error \
              --request POST \
              --output "${response_file}" \
              --write-out '%{http_code}' \
              --header "Authorization: Bearer ${GHOST_STAFF_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data-binary @- \
              "https://sync.lowvelocity.org/admin/import/bluesky"
          )"

          echo "status=${status}"
          cat "${response_file}" | jq '.'
          if [[ "${status}" -lt 200 || "${status}" -ge 300 ]]; then
            exit 1
          fi
